<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Mellow Health{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  {% block extra_css %}{% endblock %}
  <link rel="stylesheet" href="/static/css/style.css?v=5">
</head>
<body>

  <!-- Mobile top bar (hamburger + brand) -->
  <div id="mobile-topbar">
    <button id="hamburger-btn" onclick="toggleMenu()" aria-label="Open menu">
      <i class="bi bi-list"></i>
    </button>
    <span class="mobile-brand">Mellow Health</span>
  </div>

  <!-- Backdrop — tap to close drawer -->
  <div id="menu-backdrop" onclick="closeMenu()"></div>

  <!-- Sidebar / slide-in drawer -->
  <nav id="sidebar">
    <div class="sidebar-brand">
      <span>Mellow Health</span>
      <button id="sidebar-close" onclick="closeMenu()" aria-label="Close menu">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>

    <div class="sidebar-section-label">Cardio</div>
    <a href="/summary"  class="sidebar-link {% if request.url.path == '/summary' %}active{% endif %}">
      <i class="bi bi-map"></i> Summary
    </a>
    <a href="/log"      class="sidebar-link {% if request.url.path == '/log' %}active{% endif %}">
      <i class="bi bi-list-ul"></i> Activity Log
    </a>

    <div class="sidebar-section-label" style="margin-top:0.5rem">Strength</div>
    <a href="/strength/summary" class="sidebar-link {% if request.url.path == '/strength/summary' %}active{% endif %}">
      <i class="bi bi-bar-chart-fill"></i> Summary
    </a>
    <a href="/strength/log"     class="sidebar-link {% if request.url.path == '/strength/log' %}active{% endif %}">
      <i class="bi bi-list-check"></i> Activity Log
    </a>
    <a href="/strength/plans" class="sidebar-link {% if request.url.path.startswith('/strength/plans') %}active{% endif %}">
      <i class="bi bi-calendar-week"></i> Workout Plans
    </a>

    {% block sidebar_extra %}{% endblock %}
  </nav>

  <!-- Main content -->
  <div id="main-content">
    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function toggleMenu() {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('menu-backdrop').classList.toggle('visible');
    }
    function closeMenu() {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('menu-backdrop').classList.remove('visible');
    }
    // Navigating auto-closes the drawer
    document.querySelectorAll('.sidebar-link').forEach(l => l.addEventListener('click', closeMenu));
  </script>
  {% block extra_js %}{% endblock %}
</body>
</html>
